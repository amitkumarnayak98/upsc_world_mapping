<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Americas Geography Quiz - Pro App Layout</title>
    <style>
      :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --bg-color: #f0f4f8;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --success: #16a34a;
        --success-bg: #dcfce7;
        --error: #dc2626;
        --error-bg: #fee2e2;
        --border: #e2e8f0;
        --hint-bg: #e0e7ff;
        --hint-text: #4338ca;
      }

      body {
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.6;
        margin: 0;
        padding: 0;

        /* App Layout: Locks the body to the exact screen height */
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden; /* Prevents the whole browser window from scrolling */
      }

      /* Two-Column Landscape Layout */
      .layout-wrapper {
        display: flex;
        gap: 30px;
        max-width: 1200px;
        width: 100%;
        height: calc(
          100vh - 60px
        ); /* Leaves a 30px gap at the top and bottom of the screen */
        padding: 0 20px;
        box-sizing: border-box;
      }

      /* Center/Left Main Content area */
      .main-content {
        flex: 3;
        background-color: var(--card-bg);
        border-radius: 12px;
        box-shadow:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        padding: 40px;
        min-width: 0;

        /* Internal Scrolling for the question content */
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      /* Optional: Make scrollbars look nice in the main content */
      .main-content::-webkit-scrollbar {
        width: 8px;
      }
      .main-content::-webkit-scrollbar-track {
        background: transparent;
      }
      .main-content::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .main-content::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Right Sidebar area */
      .sidebar {
        flex: 1;
        background-color: var(--card-bg);
        border-radius: 12px;
        box-shadow:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        padding: 30px 20px;
        min-width: 280px;

        /* Flexbox allows it to inherit height from layout-wrapper perfectly */
        display: flex;
        flex-direction: column;
      }

      /* Sidebar Dashboard / Stats Grid */
      .sidebar-title {
        font-size: 1.1rem;
        font-weight: bold;
        margin-bottom: 15px;
        color: var(--text-main);
        text-align: center;
        flex-shrink: 0; /* Prevents title from squishing */
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 20px;
        flex-shrink: 0; /* Prevents stats from squishing */
      }

      .stat-box {
        background-color: #f8fafc;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 15px 10px;
        text-align: center;
      }

      .stat-label {
        display: block;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 5px;
      }

      .stat-value {
        display: block;
        font-size: 1.8rem;
        font-weight: 800;
        color: var(--text-main);
        line-height: 1;
      }

      .lbl-total {
        color: var(--text-muted);
      }
      .lbl-correct {
        color: var(--success);
      }
      .lbl-wrong {
        color: var(--error);
      }
      .lbl-unanswered {
        color: var(--text-muted);
      }

      .divider {
        height: 2px;
        background-color: var(--border);
        margin: 15px 0;
        flex-shrink: 0;
      }

      /* Sidebar Navigation Styles */
      .tracker-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
        gap: 12px;
        justify-items: center;
        align-content: start;

        /* Takes up remaining space in sidebar and scrolls internally */
        flex: 1;
        overflow-y: auto;
        padding-right: 5px;
        padding-bottom: 10px;
      }

      /* Scrollbar styling for the tracker */
      .tracker-container::-webkit-scrollbar {
        width: 6px;
      }
      .tracker-container::-webkit-scrollbar-track {
        background: #f1f5f9;
        border-radius: 4px;
      }
      .tracker-container::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .tracker-container::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      .tracker-circle {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        cursor: pointer;
        background-color: #e2e8f0;
        color: var(--text-muted);
        transition: all 0.2s;
        border: 2px solid transparent;
        font-size: 0.95rem;
      }

      .tracker-circle:hover {
        filter: brightness(0.9);
      }
      .tracker-circle.active {
        border-color: var(--primary);
        transform: scale(1.1);
        box-shadow: 0 0 8px rgba(37, 99, 235, 0.4);
      }
      .tracker-circle.correct {
        background-color: var(--success);
        color: white;
        border-color: var(--success);
      }
      .tracker-circle.incorrect {
        background-color: var(--error);
        color: white;
        border-color: var(--error);
      }

      /* Quiz UI Styles */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 2px solid var(--border);
        padding-bottom: 15px;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        color: var(--primary);
      }
      #progress {
        font-weight: bold;
        color: var(--text-muted);
        font-size: 1.1rem;
      }

      .question-text {
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .instruction {
        font-size: 0.9rem;
        color: var(--text-muted);
        margin-bottom: 10px;
        font-style: italic;
      }

      .hint-badge {
        display: inline-block;
        background-color: var(--hint-bg);
        color: var(--hint-text);
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 700;
        margin-bottom: 25px;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 30px;
      }

      .option-label {
        display: flex;
        align-items: center;
        padding: 16px;
        border: 2px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        background-color: #fcfcfc;
      }

      .option-label:hover:not(.disabled) {
        border-color: #cbd5e1;
        background-color: #f1f5f9;
      }
      .option-label.disabled {
        opacity: 0.6;
        cursor: not-allowed;
        background-color: #f8fafc;
      }
      .option-label input {
        margin-right: 15px;
        transform: scale(1.2);
        cursor: inherit;
      }

      .controls {
        display: flex;
        justify-content: space-between;
        margin-top: auto; /* Pushes controls to the bottom if content is short */
        border-top: 2px solid var(--border);
        padding-top: 25px;
        gap: 15px;
      }

      .btn {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 14px 20px;
        font-size: 1rem;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
        font-weight: 600;
        flex: 1;
      }

      .btn:hover:not(:disabled) {
        background-color: var(--primary-hover);
      }
      .btn:disabled {
        background-color: #94a3b8;
        cursor: not-allowed;
        opacity: 0.5;
      }

      .btn-nav {
        background-color: #475569;
      }
      .btn-nav:hover:not(:disabled) {
        background-color: #334155;
      }

      .feedback {
        margin-bottom: 25px;
        padding: 20px;
        border-radius: 8px;
        display: none;
      }
      .feedback.correct {
        display: block;
        background-color: var(--success-bg);
        color: var(--success);
        border: 1px solid #bbf7d0;
      }
      .feedback.incorrect {
        display: block;
        background-color: var(--error-bg);
        color: var(--error);
        border: 1px solid #fecaca;
      }
      .explanation {
        margin-top: 12px;
        font-size: 1rem;
        color: var(--text-main);
      }

      /* Responsive Rules for Phones and Tablets */
      @media (max-width: 900px) {
        body {
          height: auto; /* Releases the height lock */
          overflow: auto; /* Allows normal page scrolling */
          padding: 20px 0; /* Add padding for mobile */
          align-items: flex-start;
        }
        .layout-wrapper {
          flex-direction: column;
          height: auto; /* Releases wrapper height */
        }
        .main-content {
          overflow-y: visible; /* Prevents double scrollbars */
        }
        .sidebar {
          width: 100%;
          box-sizing: border-box;
          max-height: 400px; /* Gives the tracker box a set height on mobile so it doesn't take up the whole screen */
        }
      }
    </style>
  </head>
  <body>
    <div class="layout-wrapper">
      <div class="main-content" id="main-scroll-area">
        <div
          id="quiz-ui"
          style="display: flex; flex-direction: column; flex: 1"
        >
          <div class="header">
            <h1>Americas Geography Exam</h1>
            <div id="progress">Question 1 / 15</div>
          </div>

          <div id="question-text" class="question-text"></div>
          <div id="instruction" class="instruction"></div>
          <div id="hint-container"></div>

          <div id="options" class="options-container"></div>

          <div id="feedback" class="feedback">
            <strong id="feedback-title"></strong>
            <div id="feedback-desc"></div>
            <div id="explanation" class="explanation"></div>
          </div>

          <div class="controls">
            <button id="prev-btn" class="btn btn-nav" onclick="prevQuestion()">
              &larr; Previous
            </button>
            <button id="check-btn" class="btn" onclick="checkAnswer()">
              Verify Answer
            </button>
            <button id="next-btn" class="btn btn-nav" onclick="nextQuestion()">
              Next &rarr;
            </button>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <div class="sidebar-title">Current Status</div>

        <div class="stats-grid">
          <div class="stat-box">
            <span class="stat-label lbl-total">Total</span>
            <span class="stat-value" id="stat-total">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label lbl-unanswered">Pending</span>
            <span class="stat-value" id="stat-unanswered">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label lbl-correct">✔ Correct</span>
            <span class="stat-value" id="stat-correct">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label lbl-wrong">✖ Wrong</span>
            <span class="stat-value" id="stat-wrong">0</span>
          </div>
        </div>

        <div class="divider"></div>

        <div class="sidebar-title">Question Navigator</div>
        <div class="tracker-container" id="tracker"></div>
      </div>
    </div>

    <script>
      const questions = [
        {
          text: "Which of the following countries share a land border with Brazil?",
          type: "checkbox",
          instruction: "Select ALL that apply.",
          options: [
            { text: "Argentina", correct: true },
            { text: "Peru", correct: true },
            { text: "Chile", correct: false },
            { text: "Ecuador", correct: false },
            { text: "Uruguay", correct: true },
          ],
          explanation:
            "Brazil borders almost every country in South America EXCEPT Chile and Ecuador. Argentina, Peru, and Uruguay all share borders with it.",
        },
        {
          text: "Arrange the following North American deserts from North to South:<br>1. Mojave Desert<br>2. Great Basin Desert<br>3. Chihuahuan Desert<br>4. Sonoran Desert",
          type: "radio",
          instruction: "Select the single correct sequence.",
          options: [
            { text: "2 - 1 - 4 - 3", correct: true },
            { text: "1 - 2 - 4 - 3", correct: false },
            { text: "2 - 4 - 1 - 3", correct: false },
            { text: "1 - 4 - 2 - 3", correct: false },
          ],
          explanation:
            "Great Basin (Nevada/Utah - Furthest North), Mojave (California/Nevada), Sonoran (Arizona/Mexico), Chihuahuan (Texas/Mexico - Furthest South).",
        },
        {
          text: "Which of the following major rivers of the Americas flow into the Pacific Ocean?",
          type: "checkbox",
          instruction: "Select ALL correct rivers.",
          options: [
            { text: "Colorado River", correct: true },
            { text: "Columbia River", correct: true },
            { text: "Mackenzie River", correct: false },
            { text: "Yukon River", correct: true },
            { text: "Orinoco River", correct: false },
          ],
          explanation:
            "The Colorado, Columbia, and Yukon rivers drain into the Pacific Ocean (or its marginal seas like the Bering Sea). The Mackenzie flows to the Arctic, and the Orinoco flows to the Atlantic.",
        },
        {
          text: "The 'Lithium Triangle' of South America, known for massive brine lithium deposits, encompasses which three countries?",
          type: "radio",
          instruction: "Select the single correct option.",
          options: [
            { text: "Argentina, Bolivia, and Peru", correct: false },
            { text: "Argentina, Bolivia, and Chile", correct: true },
            { text: "Chile, Peru, and Ecuador", correct: false },
            { text: "Brazil, Paraguay, and Uruguay", correct: false },
          ],
          explanation:
            "The Lithium Triangle is located around the borders of Argentina, Bolivia, and Chile, centered around the Atacama Desert and neighboring arid regions.",
        },
        {
          text: "Which of the Great Lakes are shared by BOTH the United States and Canada?",
          type: "checkbox",
          instruction: "Select ALL that apply.",
          options: [
            { text: "Lake Superior", correct: true },
            { text: "Lake Michigan", correct: false },
            { text: "Lake Huron", correct: true },
            { text: "Lake Ontario", correct: true },
          ],
          explanation:
            "Lakes Superior, Huron, Erie, and Ontario lie on the border between the US and Canada. Lake Michigan is the only Great Lake located entirely within the United States.",
        },
        {
          text: "Assertion (A): The Atacama Desert is one of the driest places on Earth.<br>Reason (R): It is located on the eastern, leeward side of the Andes Mountains, causing a severe rain shadow effect.",
          type: "radio",
          instruction: "Select the correct code.",
          options: [
            { text: "Both A and R are true and R explains A", correct: false },
            {
              text: "Both A and R are true but R does not explain A",
              correct: false,
            },
            { text: "A is true but R is false", correct: true },
            { text: "A is false but R is true", correct: false },
          ],
          explanation:
            "The Atacama Desert is on the WESTERN coast of South America (Chile), not the eastern. Its extreme aridity is caused by the cold Humboldt Current and atmospheric subsidence.",
        },
        {
          text: "Which of these capital cities are located within the Andes mountain range?",
          type: "checkbox",
          instruction: "Select ALL correct capitals.",
          options: [
            { text: "Bogota (Colombia)", correct: true },
            { text: "Quito (Ecuador)", correct: true },
            { text: "La Paz (Bolivia)", correct: true },
            { text: "Buenos Aires (Argentina)", correct: false },
            { text: "Lima (Peru)", correct: false },
          ],
          explanation:
            "Bogota, Quito, and La Paz are all high-altitude capitals situated within the Andes. Buenos Aires is on the Pampas plains, and Lima is on the arid Pacific coastal strip, not high in the mountains.",
        },
        {
          text: "Which of the following physical features are located in South America?",
          type: "checkbox",
          instruction: "Select ALL that apply.",
          options: [
            { text: "Patagonia Plateau", correct: true },
            { text: "Gran Chaco", correct: true },
            { text: "Laurentian Shield", correct: false },
            { text: "Pampas", correct: true },
            { text: "Edwards Plateau", correct: false },
          ],
          explanation:
            "Patagonia, Gran Chaco, and Pampas are in South America. The Laurentian Shield (Canadian Shield) and Edwards Plateau (Texas) are in North America.",
        },
        {
          text: "Match the Straits with the landmasses they separate:<br>A. Bering Strait<br>B. Strait of Magellan<br>C. Florida Strait<br><br>1. Mainland South America and Tierra del Fuego<br>2. Asia and North America<br>3. Florida and Cuba",
          type: "radio",
          instruction: "Select the correct matching code.",
          options: [
            { text: "A-2, B-1, C-3", correct: true },
            { text: "A-1, B-2, C-3", correct: false },
            { text: "A-2, B-3, C-1", correct: false },
            { text: "A-3, B-1, C-2", correct: false },
          ],
          explanation:
            "Bering separates Asia/North America. Magellan separates mainland South America from the island of Tierra del Fuego. Florida separates the US (Florida) from Cuba.",
        },
        {
          text: "Which of the following are cold ocean currents that affect the climate of the Americas?",
          type: "checkbox",
          instruction: "Select ALL correct ocean currents.",
          options: [
            { text: "Humboldt (Peru) Current", correct: true },
            { text: "Gulf Stream", correct: false },
            { text: "California Current", correct: true },
            { text: "Falkland Current", correct: true },
            { text: "Brazil Current", correct: false },
          ],
          explanation:
            "Humboldt, California, and Falkland are all cold currents moving toward the equator. Gulf Stream and Brazil Current are warm water currents moving away from the equator.",
        },
        {
          text: "Regarding the Panama Canal, which of the following statements is true?",
          type: "radio",
          instruction: "Select the single correct option.",
          options: [
            {
              text: "It connects the Atlantic and Pacific Oceans directly at sea level without locks.",
              correct: false,
            },
            {
              text: "Ships passing from the Atlantic to the Pacific travel in a south-easterly direction.",
              correct: true,
            },
            {
              text: "It was built entirely by the French and handed over to Panama in 1914.",
              correct: false,
            },
            {
              text: "Lake Nicaragua serves as the primary freshwater source for its lock system.",
              correct: false,
            },
          ],
          explanation:
            "Due to the S-curve of the Panamanian isthmus, the Pacific entrance is actually east of the Atlantic entrance, causing ships to travel south-east. It uses a lock system, was finished by the USA, and uses Lake Gatun, not Lake Nicaragua.",
        },
        {
          text: "Which of these Central American countries do NOT have a coastline on the Caribbean Sea (Atlantic)?",
          type: "checkbox",
          instruction: "Select ALL that apply.",
          options: [
            { text: "El Salvador", correct: true },
            { text: "Belize", correct: false },
            { text: "Honduras", correct: false },
            { text: "Costa Rica", correct: false },
          ],
          explanation:
            "El Salvador is the only Central American country with no Caribbean coastline (it only touches the Pacific). Belize has no Pacific coastline. Honduras and Costa Rica have both.",
        },
        {
          text: "Which of the following mountain ranges are located in North America?",
          type: "checkbox",
          instruction: "Select ALL correct ranges.",
          options: [
            { text: "Appalachian Mountains", correct: true },
            { text: "Sierra Madre", correct: true },
            { text: "Andes Mountains", correct: false },
            { text: "Brooks Range", correct: true },
            { text: "Guiana Highlands", correct: false },
          ],
          explanation:
            "The Appalachians (Eastern US/Canada), Sierra Madre (Mexico), and Brooks Range (Alaska) are in North America. The Andes and Guiana Highlands are in South America.",
        },
        {
          text: "Assertion (A): Canadian ports on the Pacific coast, like Vancouver, remain ice-free in winter, unlike Atlantic ports at similar latitudes.<br>Reason (R): The warm North Pacific Drift current warms the western coast of Canada.",
          type: "radio",
          instruction: "Select the correct code.",
          options: [
            { text: "Both A and R are true and R explains A", correct: true },
            {
              text: "Both A and R are true but R does not explain A",
              correct: false,
            },
            { text: "A is true but R is false", correct: false },
            { text: "A is false but R is true", correct: false },
          ],
          explanation:
            "The North Pacific Drift brings warmer water to the coast of British Columbia, keeping ports like Vancouver ice-free. On the east coast, the cold Labrador Current freezes the Atlantic ports at the same latitude.",
        },
        {
          text: "Which of the following countries are landlocked in the Americas?",
          type: "checkbox",
          instruction: "Select ALL landlocked countries.",
          options: [
            { text: "Bolivia", correct: true },
            { text: "Paraguay", correct: true },
            { text: "Uruguay", correct: false },
            { text: "Suriname", correct: false },
          ],
          explanation:
            "Bolivia and Paraguay are the only two landlocked countries in South America (and the entirety of the Americas). Uruguay and Suriname both have Atlantic coastlines.",
        },
        {
          text: "The Rio de la Plata is a massive estuary and important economic waterway formed by the confluence of which of the following rivers?",
          type: "checkbox",
          instruction:
            "Select ALL rivers that form the Rio de la Plata system.",
          options: [
            { text: "Paraná River", correct: true },
            { text: "Uruguay River", correct: true },
            { text: "Amazon River", correct: false },
            { text: "Paraguay River", correct: true },
            { text: "Orinoco River", correct: false },
          ],
          explanation:
            "The Rio de la Plata basin is drained mainly by the Paraná, Paraguay, and Uruguay rivers. The Amazon and Orinoco are entirely separate, more northern river systems.",
        },
        {
          text: "Arrange the following prominent physical features of South America from North to South:<br>1. Mato Grosso Plateau<br>2. Guiana Highlands<br>3. Pampas<br>4. Amazon Basin",
          type: "radio",
          instruction: "Select the correct sequence.",
          options: [
            { text: "2 - 4 - 1 - 3", correct: true },
            { text: "4 - 2 - 1 - 3", correct: false },
            { text: "2 - 1 - 4 - 3", correct: false },
            { text: "1 - 2 - 4 - 3", correct: false },
          ],
          explanation:
            "Moving North to South: Guiana Highlands (Venezuela/Guyana), the Amazon Basin (Equatorial Brazil), Mato Grosso Plateau (Central-West Brazil), and the Pampas (Argentina).",
        },
        {
          text: "Which of the following North American mountain ranges are known for significant recent (geologically speaking) volcanic activity?",
          type: "checkbox",
          instruction: "Select ALL that apply.",
          options: [
            { text: "Cascade Range", correct: true },
            { text: "Appalachian Mountains", correct: false },
            { text: "Aleutian Range", correct: true },
            { text: "Brooks Range", correct: false },
          ],
          explanation:
            "The Cascade Range (Mt. St. Helens, Mt. Rainier) and Aleutian Range are part of the Pacific Ring of Fire. The Appalachians and Brooks Range are old fold mountains without active volcanism.",
        },
        {
          text: "The Equator passes through which of the following South American countries?",
          type: "checkbox",
          instruction: "Select ALL correct countries.",
          options: [
            { text: "Ecuador", correct: true },
            { text: "Colombia", correct: true },
            { text: "Peru", correct: false },
            { text: "Brazil", correct: true },
            { text: "Venezuela", correct: false },
          ],
          explanation:
            "The Equator passes through exactly three countries in South America: Ecuador, Colombia, and Brazil.",
        },
        {
          text: "Assertion (A): The Patagonian desert is considered a cold winter desert.<br>Reason (R): It lies in the rain shadow of the Andes mountains, blocking the moisture-laden westerlies from the Pacific Ocean.",
          type: "radio",
          instruction: "Select the correct code.",
          options: [
            { text: "Both A and R are true and R explains A", correct: true },
            {

      // State Management
      let userState = questions.map(() => ({
        submitted: false,
        isCorrect: false,
        selections: [],
      }));

      let currentQuestionIndex = 0;

      // DOM Elements
      const questionTextEl = document.getElementById("question-text");
      const instructionEl = document.getElementById("instruction");
      const hintContainerEl = document.getElementById("hint-container");
      const optionsEl = document.getElementById("options");
      const progressEl = document.getElementById("progress");
      const feedbackEl = document.getElementById("feedback");
      const feedbackTitleEl = document.getElementById("feedback-title");
      const feedbackDescEl = document.getElementById("feedback-desc");
      const explanationEl = document.getElementById("explanation");
      const checkBtn = document.getElementById("check-btn");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const trackerContainer = document.getElementById("tracker");
      const mainScrollArea = document.getElementById("main-scroll-area");

      // Scoreboard Elements
      const statTotal = document.getElementById("stat-total");
      const statCorrect = document.getElementById("stat-correct");
      const statWrong = document.getElementById("stat-wrong");
      const statUnanswered = document.getElementById("stat-unanswered");

      function initQuiz() {
        statTotal.innerText = questions.length;
        renderTracker();
        updateScoreboard();
        loadQuestion();
      }

      function updateScoreboard() {
        let correct = 0,
          wrong = 0,
          unanswered = 0;
        userState.forEach((state) => {
          if (!state.submitted) unanswered++;
          else if (state.isCorrect) correct++;
          else wrong++;
        });
        statCorrect.innerText = correct;
        statWrong.innerText = wrong;
        statUnanswered.innerText = unanswered;
      }

      function renderTracker() {
        trackerContainer.innerHTML = "";
        questions.forEach((_, index) => {
          const circle = document.createElement("div");
          circle.className = "tracker-circle";
          circle.innerText = index + 1;
          circle.onclick = () => goToQuestion(index);
          trackerContainer.appendChild(circle);
        });
        updateTrackerUI();
      }

      function updateTrackerUI() {
        const circles = trackerContainer.children;
        for (let i = 0; i < circles.length; i++) {
          circles[i].className = "tracker-circle";
          if (i === currentQuestionIndex) circles[i].classList.add("active");

          if (userState[i].submitted) {
            if (userState[i].isCorrect) circles[i].classList.add("correct");
            else circles[i].classList.add("incorrect");
          }
        }
      }

      function loadQuestion() {
        // Scroll the main content box back to top when switching questions
        mainScrollArea.scrollTop = 0;

        const q = questions[currentQuestionIndex];
        const state = userState[currentQuestionIndex];

        questionTextEl.innerHTML = q.text;
        instructionEl.innerText = q.instruction;
        progressEl.innerText = `Question ${currentQuestionIndex + 1} / ${questions.length}`;

        const correctOptionsCount = q.options.filter((o) => o.correct).length;
        const noun = correctOptionsCount === 1 ? "option is" : "options are";
        hintContainerEl.innerHTML = `<div class="hint-badge">💡 Hint: ${correctOptionsCount} ${noun} correct.</div>`;

        optionsEl.innerHTML = "";
        feedbackEl.className = "feedback";

        prevBtn.disabled = currentQuestionIndex === 0;
        nextBtn.disabled = currentQuestionIndex === questions.length - 1;
        checkBtn.style.display = state.submitted ? "none" : "block";

        q.options.forEach((opt, index) => {
          const label = document.createElement("label");
          label.className = "option-label";
          label.id = `label-${index}`;

          const input = document.createElement("input");
          input.type = q.type;
          input.name = "quiz-option";
          input.value = index;

          if (state.selections.includes(index)) {
            input.checked = true;
          }

          if (state.submitted) {
            input.disabled = true;
            label.classList.add("disabled");
          } else {
            input.addEventListener("change", () =>
              handleInputUpdate(q.type, correctOptionsCount),
            );
          }

          label.appendChild(input);
          label.appendChild(document.createTextNode(opt.text));
          optionsEl.appendChild(label);
        });

        if (state.submitted) {
          displayFeedback(state.isCorrect, q.explanation);
        }

        if (!state.submitted) handleInputUpdate(q.type, correctOptionsCount);
        updateTrackerUI();
      }

      function handleInputUpdate(type, maxAllowed) {
        const inputs = document.querySelectorAll('input[name="quiz-option"]');
        const state = userState[currentQuestionIndex];
        state.selections = [];
        let checkedCount = 0;

        inputs.forEach((input, index) => {
          if (input.checked) {
            state.selections.push(index);
            checkedCount++;
          }
        });

        if (type === "checkbox") {
          inputs.forEach((input, index) => {
            const label = document.getElementById(`label-${index}`);
            if (checkedCount >= maxAllowed && !input.checked) {
              input.disabled = true;
              label.classList.add("disabled");
            } else {
              input.disabled = false;
              label.classList.remove("disabled");
            }
          });
        }
      }

      function checkAnswer() {
        const q = questions[currentQuestionIndex];
        const state = userState[currentQuestionIndex];
        const inputs = document.querySelectorAll('input[name="quiz-option"]');

        if (state.selections.length === 0) {
          alert("Please select an answer before verifying.");
          return;
        }

        let allCorrectChecked = true;
        let noWrongChecked = true;

        inputs.forEach((input, index) => {
          const isChecked = input.checked;
          const isCorrectOption = q.options[index].correct;

          if (isCorrectOption && !isChecked) allCorrectChecked = false;
          if (!isCorrectOption && isChecked) noWrongChecked = false;
        });

        state.submitted = true;
        state.isCorrect = allCorrectChecked && noWrongChecked;

        inputs.forEach((input, index) => {
          input.disabled = true;
          document.getElementById(`label-${index}`).classList.add("disabled");
        });

        checkBtn.style.display = "none";

        displayFeedback(state.isCorrect, q.explanation);
        updateScoreboard();
        updateTrackerUI();

        // Auto scroll to feedback so the user doesn't have to scroll down manually
        setTimeout(() => {
          feedbackEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }, 100);
      }

      function displayFeedback(isCorrect, explanationText) {
        if (isCorrect) {
          feedbackEl.className = "feedback correct";
          feedbackTitleEl.innerText = "Correct!";
          feedbackDescEl.innerText = "";
        } else {
          feedbackEl.className = "feedback incorrect";
          feedbackTitleEl.innerText = "Incorrect.";
          feedbackDescEl.innerText = "Review the explanation below:";
        }
        explanationEl.innerHTML = explanationText;
      }

      function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
          currentQuestionIndex++;
          loadQuestion();
        }
      }

      function prevQuestion() {
        if (currentQuestionIndex > 0) {
          currentQuestionIndex--;
          loadQuestion();
        }
      }

      function goToQuestion(index) {
        currentQuestionIndex = index;
        loadQuestion();
      }

      initQuiz();
    </script>
